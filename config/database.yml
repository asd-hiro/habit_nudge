default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  adapter: mysql2
  encoding: utf8mb4    # ✅ MySQL用のエンコーディングを指定
  username: root
  password:
  host: localhost
  database: habit_nudge_development

test:
  <<: *default
  adapter: mysql2
  encoding: utf8mb4    # ✅ MySQL用のエンコーディングを指定
  username: root
  password:
  host: localhost
  database: habit_nudge_test

production:
  <<: *default
  adapter: postgresql
  encoding: unicode    # ✅ PostgreSQL用のエンコーディングを指定
  url: <%= ENV['DATABASE_URL'] %>
